<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Password Reset Successful</title>
  </head>
  <body
    style="
      font-family: Inter, Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: #f4f4f5;
      padding: 20px;
      margin: 0;
    "
  >
    <div
      style="
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 2rem;
        text-align: center;
        overflow-wrap: break-word;
      "
    >
      <img
        src="/backend/public/logo-horiz.svg"
        alt="BlackCloud Logo"
        style="height: 50px; width: auto; margin-bottom: 1.5rem"
      />

      <h1 style="margin-bottom: 1rem">Password Reset Successful</h1>

      <p style="margin-bottom: 1.5rem; font-size: 1rem">
        Hi <strong>{name}</strong>,
        <br />
        This email to confirm that your password has been successfully reset.
      </p>
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="64"
        height="64"
        fill="currentColor"
        class="bi bi-check-circle-fill"
        viewBox="0 0 16 16"
      >
        <path
          d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"
        />
      </svg>
      <p style="margin-bottom: 1.5rem; font-size: 1rem">
        If you did not initiate this password reset, please contact our support
        team immediately.
      </p>

      <hr style="margin: 2rem 0; border: none; border-top: 1px solid #eee" />

      <p style="font-size: 0.9rem; color: #888">
        Best regards,<br />
        The BlackCloud Team
      </p>
    </div>
  </body>
</html>
