<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Password Reset Request</title>
  </head>
  <body
    style="
      font-family: Inter, Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: #f4f4f5;
      padding: 20px;
      margin: 0;
    "
  >
    <div
      style="
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 2rem;
        text-align: center;
        overflow-wrap: break-word;
      "
    >
      <img
        src="logo-horiz.svg"
        alt="BlackCloud Logo"
        style="height: 50px; width: auto; margin-bottom: 1.5rem"
      />

      <h1 style="margin-bottom: 1rem">Password Reset Request</h1>

      <p style="margin-bottom: 1.5rem; font-size: 1rem">
        Hi <strong>{name}</strong>,
        <br />
        We received a request to reset your password.
      </p>
      <p style="margin-bottom: 1.5rem; font-size: 1rem">
        To reset your password, click the button below:
      </p>
      <a
        href="{resetLink}"
        style="
          display: inline-block;
          background-color: #333;
          color: white;
          padding: 1rem 2rem;
          border-radius: 20px;
          font-size: 1.5rem;
          font-weight: bold;
          text-decoration: none;
          letter-spacing: 0.2rem;
          margin: 1.5rem 0;
          box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        "
      >
        Reset Password
      </a>

      <p style="margin: 1rem 0; font-size: 0.95rem; color: #555">
        This code will expire in <strong>1 hour</strong> for security reasons.
      </p>

      <p style="font-size: 0.95rem; color: #555">
        If you didn't make this request, please ignore this email.
      </p>

      <hr style="margin: 2rem 0; border: none; border-top: 1px solid #eee" />

      <p style="font-size: 0.9rem; color: #888">
        Best regards,<br />
        The BlackCloud Team
      </p>
    </div>
  </body>
</html>
